<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Azure Resilient Web App Infrastructure Architecture</title>
<desc>Structural diagram showing VNet with three subnets containing Load Balancer, VMSS, Management VM, Bastion, plus Storage Account, Recovery Services Vault, and Azure Monitor outside the VNet boundary.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Calibri, Arial, sans-serif; }
.th { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
.ts { font-size: 11px; font-weight: 400; fill: #555; }
</style>
</defs>

<!-- Internet -->
<rect x="260" y="18" width="160" height="36" rx="8" fill="#e8e8e6" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="41" text-anchor="middle">Internet / Users</text>
<line x1="340" y1="54" x2="340" y2="78" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- VNet outer boundary -->
<rect x="20" y="80" width="480" height="530" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text class="th" x="36" y="106" fill="#185FA5">vnet-webapp-demo  10.0.0.0/16</text>

<!-- web-subnet -->
<rect x="36" y="120" width="448" height="160" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="52" y="142" fill="#0F6E56">web-subnet  10.0.1.0/24</text>

<!-- Load Balancer -->
<rect x="52" y="156" width="180" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="142" y="176" text-anchor="middle" fill="#085041">Load Balancer</text>
<text class="ts" x="142" y="196" text-anchor="middle" fill="#0F6E56">lb-webapp-demo  port 80</text>

<!-- VMSS -->
<rect x="264" y="156" width="204" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="366" y="176" text-anchor="middle" fill="#085041">VM Scale Set</text>
<text class="ts" x="366" y="196" text-anchor="middle" fill="#0F6E56">vmss-webapp-demo  2× B2ats_v2</text>

<!-- LB to VMSS arrow -->
<line x1="232" y1="182" x2="262" y2="182" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

<!-- app-subnet -->
<rect x="36" y="296" width="220" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="52" y="318" fill="#534AB7">app-subnet  10.0.2.0/24</text>

<!-- Management VM -->
<rect x="52" y="332" width="188" height="52" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="146" y="352" text-anchor="middle" fill="#26215C">Management VM</text>
<text class="ts" x="146" y="372" text-anchor="middle" fill="#534AB7">vm-mgmt-demo  B2ats_v2</text>

<!-- mgmt-subnet -->
<rect x="276" y="296" width="208" height="120" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="292" y="318" fill="#854F0B">mgmt-subnet  10.0.3.0/24</text>
<text class="ts" x="292" y="346" fill="#BA7517">Reserved for management</text>
<text class="ts" x="292" y="364" fill="#BA7517">traffic and admin access</text>

<!-- AzureBastionSubnet -->
<rect x="36" y="432" width="448" height="80" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="52" y="454" fill="#993C1D">AzureBastionSubnet  10.0.4.0/26</text>

<!-- Bastion -->
<rect x="52" y="468" width="180" height="32" rx="8" fill="#F0997B" stroke="#993C1D" stroke-width="1"/>
<text class="th" x="142" y="484" text-anchor="middle" fill="#4A1B0C">Azure Bastion</text>
<text class="ts" x="260" y="490" text-anchor="middle" fill="#993C1D">Secure browser SSH/RDP — no public IP on VMs</text>

<!-- Region label -->
<text class="ts" x="260" y="624" text-anchor="middle" fill="#888780">Resource group: rg-webapp-infra-demo  •  Region: Central India</text>

<!-- External services -->
<!-- Storage Account -->
<rect x="520" y="120" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="594" y="140" text-anchor="middle" fill="#2C2C2A">Storage Account</text>
<text class="ts" x="594" y="160" text-anchor="middle" fill="#5F5E5A">StorageV2  LRS  TLS 1.2</text>

<!-- Recovery Services Vault -->
<rect x="520" y="196" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="594" y="216" text-anchor="middle" fill="#2C2C2A">Recovery Vault</text>
<text class="ts" x="594" y="236" text-anchor="middle" fill="#5F5E5A">rsv-webapp-demo  daily</text>

<!-- Azure Monitor -->
<rect x="520" y="272" width="148" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="594" y="292" text-anchor="middle" fill="#2C2C2A">Azure Monitor</text>
<text class="ts" x="594" y="312" text-anchor="middle" fill="#5F5E5A">Log Analytics  CPU alert</text>

<!-- Connector dashes -->
<line x1="500" y1="146" x2="518" y2="146" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="500" y1="222" x2="518" y2="222" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="500" y1="298" x2="518" y2="298" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Backup arrow mgmt VM to RSV -->
<path d="M240 358 Q490 358 518 222" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- Monitor arrow VMSS to Azure Monitor -->
<path d="M468 182 Q500 182 518 298" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="20" y="640" width="640" height="68" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="36" y="660" fill="#888780">Legend:</text>
<rect x="96" y="650" width="14" height="14" rx="3" fill="#1D9E75" opacity="0.5"/>
<text class="ts" x="116" y="662" fill="#555">Web tier</text>
<rect x="186" y="650" width="14" height="14" rx="3" fill="#7F77DD" opacity="0.5"/>
<text class="ts" x="206" y="662" fill="#555">App tier</text>
<rect x="266" y="650" width="14" height="14" rx="3" fill="#BA7517" opacity="0.5"/>
<text class="ts" x="286" y="662" fill="#555">Mgmt tier</text>
<rect x="366" y="650" width="14" height="14" rx="3" fill="#D85A30" opacity="0.5"/>
<text class="ts" x="386" y="662" fill="#555">Bastion subnet</text>
<rect x="486" y="650" width="14" height="14" rx="3" fill="#888780" opacity="0.5"/>
<text class="ts" x="506" y="662" fill="#555">External services</text>
<line x1="36" y1="690" x2="160" y2="690" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
<text class="ts" x="168" y="694" fill="#555">Monitoring / backup connections</text>
<line x1="380" y1="690" x2="440" y2="690" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="448" y="694" fill="#555">Traffic flow</text>
</svg>
